<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TooEvento - Próximos Eventos</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Estilos (sin cambios) */
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .tab-button { padding: 8px 6px; border-bottom: 3px solid transparent; color: #9ca3af; transition: all 0.2s ease-in-out; font-weight: 500; font-size: 0.875rem; }
        .tab-button:hover { color: #d1d5db; }
        .tab-button.active { color: #a78bfa; border-bottom-color: #a78bfa; font-weight: 600; }
        .loader { border: 4px solid #374151; border-top: 4px solid #a78bfa; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <div class="max-w-lg mx-auto bg-gray-900 min-h-screen flex flex-col">
        
        <header class="bg-gray-800/80 backdrop-blur-sm sticky top-0 z-10 p-4 shadow-lg">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-purple-400"><path d="m12 8-9.04 9.06a2.82 2.82 0 1 0 3.98 3.98L16 12"/><circle cx="17" cy="7" r="5"/></svg>
                    <h1 class="text-2xl font-bold tracking-tight">TooEvento</h1>
                </div>
                <!-- Campanita de Notificación (botón) -->
                <button id="bell-button" class="relative p-1">
                    <i data-lucide="bell" class="w-6 h-6 text-gray-300"></i>
                    <span id="bell-dot" class="hidden absolute top-0 right-0 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-gray-800"></span>
                </button>
            </div>
            <p class="text-gray-400 text-sm mt-1">Tu guía de eventos en vivo.</p>
            
            <div class="mt-3 relative" id="custom-country-selector">
                <label class="text-xs font-medium text-gray-400">Selecciona un país:</label>
                <button id="country-selector-button" class="w-full bg-gray-700 border border-gray-600 rounded-md p-2 mt-1 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 flex justify-between items-center text-left">
                    <span class="truncate">Chile</span>
                    <i data-lucide="chevron-down" class="w-4 h-4 transition-transform duration-200 ease-in-out flex-shrink-0 ml-2"></i>
                </button>
                <div id="country-options" class="hidden absolute w-full mt-1 bg-gray-800 border border-gray-600 rounded-md shadow-lg z-20 max-h-60 overflow-y-auto"></div>
            </div>

            <div id="category-tabs" class="flex space-x-1 sm:space-x-2 mt-4 border-b border-gray-700 flex-nowrap">
                <button class="tab-button active flex-1 text-center" data-category="musica"><i data-lucide="music-2" class="w-4 h-4 inline-block mr-1"></i>Música</button>
                <button class="tab-button flex-1 text-center" data-category="deportes"><i data-lucide="trophy" class="w-4 h-4 inline-block mr-1"></i>Deportes</button>
                <button class="tab-button flex-1 text-center" data-category="entretencion"><i data-lucide="sparkles" class="w-4 h-4 inline-block mr-1"></i>Entretención</button>
            </div>
        </header>

        <main class="p-4 flex-grow">
            <h2 id="events-title" class="text-xl font-semibold text-purple-300 mb-4">Próximos Eventos</h2>
            
            <div id="event-list" class="space-y-4"></div>
            
            <div id="infinite-loader" class="flex justify-center py-4 hidden">
                <div class="loader"></div>
            </div>
        </main>

        <footer class="text-center p-4">
            <p class="text-xs text-gray-500">&copy; 2025 TooEvento | Desarrollado por Braulio Cisternas, Chile</p>
        </footer>
    </div>

    <!-- Pop-up (Modal) de Notificación -->
    <div id="notification-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 rounded-lg shadow-xl w-full max-w-sm">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center">
                <h4 class="font-bold text-green-300">¡Nuevos eventos añadidos!</h4>
                <button id="modal-close-button">
                    <i data-lucide="x" class="w-5 h-5 text-gray-400 hover:text-white"></i>
                </button>
            </div>
            <div class="p-4">
                <ul id="new-events-list" class="text-sm list-disc list-inside text-gray-200 max-h-60 overflow-y-auto">
                    <!-- Los nuevos eventos se listarán aquí -->
                </ul>
            </div>
        </div>
    </div>

    <!-- SDKs de Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB--5S0Bw8WuP1pVjE3t2R1lXGVEksxufo",
            authDomain: "tooevento-c64bb.firebaseapp.com",
            projectId: "tooevento-c64bb",
            storageBucket: "tooevento-c64bb.appspot.com",
            messagingSenderId: "318016749963",
            appId: "1:318016749963:web:154cdf6ed42217a188af8e",
            measurementId: "G-YEM7Y80TWS"
        };
        const TICKETMASTER_API_KEY = 'QX2DJw9bGmFcVIqHR9L49W1eezGOwsZ4';

        const countries = { "CL": "Chile", "US": "Estados Unidos", "GB": "Gran Bretaña", "MX": "México", "ES": "España", "CA": "Canadá", "AU": "Australia" };
        
        let db;
        let currentPage = 0;
        let isLoading = false;
        let allEventsLoaded = false;
        let customEventsUnsubscribe = null; 
        let firebaseEvents = []; 
        let ticketmasterEvents = []; 

        document.addEventListener('DOMContentLoaded', () => {
            if (!TICKETMASTER_API_KEY || TICKETMASTER_API_KEY === 'PEGA_AQUI_TU_API_KEY') { showApiKeyWarning(); lucide.createIcons(); return; }
            if (!firebaseConfig.projectId) { showFirebaseConfigWarning(); lucide.createIcons(); return; }
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
            } catch(e) { console.error("Error al inicializar Firebase.", e); if (e.code !== 'duplicate-app') { renderError("Error de configuración de Firebase"); lucide.createIcons(); return; } }
            
            setupCustomCountrySelector();
            setupTabs();
            setupInfiniteScroll();
            setupNotification();
            startNewSearch(); 
            lucide.createIcons();
        });

        function setupNotification() {
            const bellButton = document.getElementById('bell-button');
            const modal = document.getElementById('notification-modal');
            const bellDot = document.getElementById('bell-dot');
            const modalClose = document.getElementById('modal-close-button');

            bellButton.addEventListener('click', () => {
                modal.classList.remove('hidden');
                bellDot.classList.add('hidden');
                lucide.createIcons(); // Vuelve a renderizar el ícono de cierre en el modal
            });
            modalClose.addEventListener('click', () => modal.classList.add('hidden'));
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.add('hidden'); });
        }
        
        function startNewSearch() {
            currentPage = 0;
            allEventsLoaded = false;
            firebaseEvents = [];
            ticketmasterEvents = [];
            document.getElementById('event-list').innerHTML = '';
            document.getElementById('notification-modal').classList.add('hidden');
            document.getElementById('bell-dot').classList.add('hidden');

            setupRealtimeListener(); 
            fetchTicketmasterEvents();
        }

        function setupRealtimeListener() {
            if (customEventsUnsubscribe) customEventsUnsubscribe();

            const countryCode = document.getElementById('country-selector-button').dataset.code;
            const category = document.querySelector('.tab-button.active').dataset.category;
            
            const q = query(collection(db, "events"), where("countryCode", "==", countryCode), where("category", "==", category));
            
            customEventsUnsubscribe = onSnapshot(q, (querySnapshot) => {
                console.log(`[DEBUG-FIREBASE] La consulta en tiempo real devolvió ${querySnapshot.size} documento(s) para ${countryCode}/${category}.`);
                const allFirebaseEvents = querySnapshot.docs.map(doc => doc.data());
                
                const today = new Date();
                const year = today.getFullYear();
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const day = String(today.getDate()).padStart(2, '0');
                const todayDateString = `${year}-${month}-${day}`;
                
                const futureFirebaseEvents = allFirebaseEvents.filter(event => event.date >= todayDateString);
                
                checkForNewFirebaseEvents(futureFirebaseEvents, countryCode, category);
                firebaseEvents = futureFirebaseEvents;
                mergeAndRenderAllEvents(); 
            }, (error) => {
                console.error("Error en el listener de Firebase: ", error);
                renderError("Error de conexión en tiempo real.");
            });
        }
        
        async function fetchTicketmasterEvents() {
            isLoading = true;
            const countryCode = document.getElementById('country-selector-button').dataset.code;
            const category = document.querySelector('.tab-button.active').dataset.category;
            const classificationName = mapCategoryToClassification(category);
            const infiniteLoader = document.getElementById('infinite-loader');

            if (currentPage === 0) {
                document.getElementById('event-list').innerHTML = `<div class="flex justify-center py-10"><div class="loader"></div></div>`;
            } else {
                infiniteLoader.classList.remove('hidden');
            }
            
            const todayISOString = new Date().toISOString().split('.')[0] + "Z";
            const apiUrl = `https://app.ticketmaster.com/discovery/v2/events.json?classificationName=${classificationName}&countryCode=${countryCode}&apikey=${TICKETMASTER_API_KEY}&sort=date,asc&page=${currentPage}&startDateTime=${todayISOString}`;
            
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                const apiEventsRaw = data._embedded ? data._embedded.events : [];
                
                if (apiEventsRaw.length === 0 && currentPage > 0) allEventsLoaded = true;
                
                const newApiEvents = apiEventsRaw.map(transformApiEvent);
                ticketmasterEvents = (currentPage === 0) ? newApiEvents : [...ticketmasterEvents, ...newApiEvents];
                
                mergeAndRenderAllEvents();
            } catch (error) {
                console.error("Error fetching Ticketmaster events:", error);
                renderError();
            } finally {
                isLoading = false;
                infiniteLoader.classList.add('hidden');
            }
        }

        function mergeAndRenderAllEvents() {
            const combinedEvents = [...ticketmasterEvents, ...firebaseEvents];
            combinedEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
            renderEvents(combinedEvents);
        }

        function checkForNewFirebaseEvents(events, countryCode, category) {
            const storageKey = `seenFirebaseEvents-${countryCode}-${category}`;
            const seenEventsJSON = localStorage.getItem(storageKey);
            const seenEvents = seenEventsJSON ? new Set(JSON.parse(seenEventsJSON)) : new Set();

            const currentEventIds = events.map(event => `${event.title}-${event.date}`);
            const newEventIds = currentEventIds.filter(id => !seenEvents.has(id));

            if (newEventIds.length > 0 && seenEvents.size > 0) {
                const newList = document.getElementById('new-events-list');
                const bellDot = document.getElementById('bell-dot');
                
                const newEventObjects = events.filter(event => newEventIds.includes(`${event.title}-${event.date}`));
                newList.innerHTML = newEventObjects.map(event => `<li>${event.title}</li>`).join('');
                
                bellDot.classList.remove('hidden');
            }
            localStorage.setItem(storageKey, JSON.stringify(currentEventIds));
        }
        
        function renderEvents(events) {
            const eventListContainer = document.getElementById('event-list');
            const countryCode = document.getElementById('country-selector-button').dataset.code;
            const category = document.querySelector('.tab-button.active').dataset.category;
            const countryName = countries[countryCode];
            document.getElementById('events-title').textContent = `Eventos de ${category} en ${countryName}`;
            
            if (events.length === 0 && !isLoading) {
                eventListContainer.innerHTML = `<div class="text-center py-10"><i data-lucide="calendar-off" class="mx-auto h-12 w-12 text-gray-500"></i><p class="mt-4 text-gray-400">No se encontraron eventos para esta categoría en ${countryName}.</p></div>`;
            } else {
                 eventListContainer.innerHTML = events.map(event => createEventCard(event)).join('');
            }
            lucide.createIcons();
        }

        function mapCategoryToClassification(category) { switch (category) { case 'musica': return 'Music'; case 'deportes': return 'Sports'; case 'entretencion': return 'Arts & Theatre'; default: return 'Music'; } }
        function setupInfiniteScroll() { window.addEventListener('scroll', () => { if (isLoading || allEventsLoaded) return; if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) { currentPage++; fetchTicketmasterEvents(); } }); }
        function setupCustomCountrySelector() { const selectorContainer = document.getElementById('custom-country-selector'); const button = document.getElementById('country-selector-button'); const optionsContainer = document.getElementById('country-options'); optionsContainer.innerHTML = Object.entries(countries).map(([code, name]) => `<a href="#" class="block px-3 py-2 text-sm text-gray-300 hover:bg-purple-600 hover:text-white" data-code="${code}">${name}</a>`).join(''); button.addEventListener('click', () => { optionsContainer.classList.toggle('hidden'); const icon = button.querySelector('svg'); if (icon) icon.classList.toggle('rotate-180'); }); optionsContainer.addEventListener('click', (e) => { e.preventDefault(); const selectedOption = e.target.closest('a'); if (!selectedOption) return; button.querySelector('span').textContent = selectedOption.textContent; button.dataset.code = selectedOption.dataset.code; optionsContainer.classList.add('hidden'); const icon = button.querySelector('svg'); if (icon) icon.classList.remove('rotate-180'); startNewSearch(); }); document.addEventListener('click', (e) => { if (!selectorContainer.contains(e.target)) { optionsContainer.classList.add('hidden'); const icon = button.querySelector('svg'); if (icon) icon.classList.remove('rotate-180'); } }); button.dataset.code = 'CL'; }
        function setupTabs() { const tabsContainer = document.getElementById('category-tabs'); tabsContainer.addEventListener('click', (e) => { const clickedTab = e.target.closest('.tab-button'); if (!clickedTab) return; tabsContainer.querySelectorAll('.tab-button').forEach(tab => tab.classList.remove('active')); clickedTab.classList.add('active'); startNewSearch(); }); }
        function transformApiEvent(event) { return { title: event.name, date: event.dates.start.localDate, time: event.dates.start.localTime, venue: event._embedded?.venues[0]?.name || 'Lugar por confirmar', city: event._embedded?.venues[0]?.city?.name || '', ticketUrl: event.url, image: event.images.find(img => img.ratio === '3_2')?.url || 'https://placehold.co/300x200/4b5563/ffffff?text=Evento', price: event.priceRanges?.[0] ? `${event.priceRanges[0].min} - ${event.priceRanges[0].max} ${event.priceRanges[0].currency}` : 'Consultar precio' }; }
        function renderError(message = "Hubo un error al cargar los eventos.") { const eventListContainer = document.getElementById('event-list'); if (eventListContainer) { eventListContainer.innerHTML = `<div class="text-center py-10 bg-red-900/20 rounded-lg"><i data-lucide="wifi-off" class="mx-auto h-12 w-12 text-red-400"></i><p class="mt-4 text-red-300">${message}</p><p class="text-xs text-gray-400 mt-2">Verifica la consola para más detalles.</p></div>`; lucide.createIcons(); } }
        function showApiKeyWarning() { renderError("Configuración Requerida: Falta la API Key de Ticketmaster."); }
        function showFirebaseConfigWarning() { renderError("Configuración Requerida: Falta la configuración de Firebase."); }
        function createEventCard(event) { const { title, date, time, venue, city, ticketUrl, image, price } = event; const eventDate = new Date(`${date}T${time || '00:00:00'}`); const formattedDate = eventDate.toLocaleDateString('es-CL', { weekday: 'long', day: 'numeric', month: 'long' }); return `<div class="bg-gray-800 rounded-xl overflow-hidden shadow-lg transform hover:scale-105 transition-transform duration-300 ease-in-out"><div class="flex"><img src="${image}" onerror="this.onerror=null;this.src='https://placehold.co/300x200/4b5563/ffffff?text=Evento';" alt="Imagen de ${title}" class="w-28 h-auto object-cover"><div class="p-4 flex flex-col justify-between flex-grow"><div><h3 class="text-lg font-bold text-purple-300 leading-tight">${title}</h3><p class="text-gray-300 font-medium capitalize text-sm">${formattedDate}</p><div class="mt-2 space-y-1 text-xs text-gray-400"><div class="flex items-center"><i data-lucide="map-pin" class="w-3 h-3 mr-2 text-purple-400"></i><span>${venue}, ${city}</span></div>${time ? `<div class="flex items-center"><i data-lucide="clock" class="w-3 h-3 mr-2 text-purple-400"></i><span>${time.substring(0,5)} hrs.</span></div>` : ''}<div class="flex items-center"><i data-lucide="dollar-sign" class="w-3 h-3 mr-2 text-purple-400"></i><span>${price}</span></div></div></div><a href="${ticketUrl}" target="_blank" class="mt-3 bg-purple-600 hover:bg-purple-500 text-white font-bold py-2 px-3 rounded-lg text-center text-sm transition-colors duration-200"><i data-lucide="ticket" class="w-4 h-4 inline-block mr-1"></i>Ver Entradas</a></div></div></div>`; }
    </script>
</body>
</html>
