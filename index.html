<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TooEvento - Próximos Eventos</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Estilos (sin cambios) */
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .tab-button { padding: 8px 6px; border-bottom: 3px solid transparent; color: #9ca3af; transition: all 0.2s ease-in-out; font-weight: 500; font-size: 0.875rem; }
        .tab-button:hover { color: #d1d5db; }
        .tab-button.active { color: #a78bfa; border-bottom-color: #a78bfa; font-weight: 600; }
        .loader { border: 4px solid #374151; border-top: 4px solid #a78bfa; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <div class="w-full bg-gray-900 min-h-screen flex flex-col">
        
        <header class="bg-gray-800/80 backdrop-blur-sm sticky top-0 z-10 px-4 sm:px-8 lg:px-12 py-4 shadow-lg">
            <div class="max-w-7xl mx-auto">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M8 2v4"></path>
                            <path d="M16 2v4"></path>
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <path d="M3 10h18"></path>
                        </svg>
                        <h1 class="text-2xl font-bold tracking-tight">TooEvento</h1>
                    </div>
                    <!-- Campanita de Notificación (botón) -->
                    <button id="bell-button" class="relative p-1">
                        <i data-lucide="bell" class="w-6 h-6 text-gray-300"></i>
                        <span id="bell-dot" class="hidden absolute top-0 right-0 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-gray-800"></span>
                    </button>
                </div>
                <p class="text-gray-400 text-sm mt-1">Tu guía de eventos en vivo.</p>
                
                <div class="mt-3 relative grid grid-cols-1 sm:grid-cols-3 gap-4" id="custom-country-selector">
                    <div class="sm:col-span-1">
                        <label class="text-xs font-medium text-gray-400">Selecciona un país:</label>
                        <button id="country-selector-button" class="w-full bg-gray-700 border border-gray-600 rounded-md p-2 mt-1 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 flex justify-between items-center">
                            <span class="truncate">Chile</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 transition-transform duration-200 ease-in-out flex-shrink-0 ml-2"></i>
                        </button>
                        <div id="country-options" class="hidden absolute w-full mt-1 bg-gray-800 border border-gray-600 rounded-md shadow-lg z-20 max-h-60 overflow-y-auto"></div>
                    </div>
                </div>

                <div id="category-tabs" class="flex space-x-2 sm:space-x-4 mt-6 border-b border-gray-700 flex-wrap lg:flex-nowrap gap-2">
                    <button class="tab-button active flex-1 sm:flex-none text-center whitespace-nowrap" data-category="musica"><i data-lucide="music-2" class="w-4 h-4 inline-block mr-1"></i>Música</button>
                    <button class="tab-button flex-1 sm:flex-none text-center whitespace-nowrap" data-category="deportes"><i data-lucide="trophy" class="w-4 h-4 inline-block mr-1"></i>Deportes</button>
                    <button class="tab-button flex-1 sm:flex-none text-center whitespace-nowrap" data-category="entretencion"><i data-lucide="sparkles" class="w-4 h-4 inline-block mr-1"></i>Entretención</button>
                </div>
            </div>
        </header>

        <main class="px-4 sm:px-8 lg:px-12 py-6 flex-grow">
            <div class="max-w-7xl mx-auto">
                <h2 id="events-title" class="text-2xl sm:text-3xl font-semibold text-purple-300 mb-6">Próximos Eventos</h2>
                
                <div id="event-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
                
                <div id="infinite-loader" class="flex justify-center py-8 hidden">
                    <div class="loader"></div>
                </div>
            </div>
        </main>

        <footer class="text-center px-4 py-4 max-w-7xl mx-auto w-full">
            <p class="text-xs text-gray-500">&copy; 2025 TooEvento | Desarrollado por Braulio Zanni, Chile</p>
        </footer>
    </div>

    <!-- Pop-up (Modal) de Notificación -->
    <div id="notification-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 rounded-lg shadow-xl w-full max-w-sm">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center">
                <h4 class="font-bold text-green-300">¡Nuevos eventos añadidos!</h4>
                <button id="modal-close-button">
                    <i data-lucide="x" class="w-5 h-5 text-gray-400 hover:text-white"></i>
                </button>
            </div>
            <div class="p-4">
                <ul id="new-events-list" class="text-sm list-disc list-inside text-gray-200 max-h-60 overflow-y-auto">
                    <!-- Los nuevos eventos se listarán aquí -->
                </ul>
            </div>
        </div>
    </div>

    <!-- SDKs de Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB--5S0Bw8WuP1pVjE3t2R1lXGVEksxufo",
            authDomain: "tooevento-c64bb.firebaseapp.com",
            projectId: "tooevento-c64bb",
            storageBucket: "tooevento-c64bb.appspot.com",
            messagingSenderId: "318016749963",
            appId: "1:318016749963:web:154cdf6ed42217a188af8e",
            measurementId: "G-YEM7Y80TWS"
        };
        const TICKETMASTER_API_KEY = 'QX2DJw9bGmFcVIqHR9L49W1eezGOwsZ4';

        const countries = { "CL": "Chile", "US": "Estados Unidos", "GB": "Gran Bretaña", "MX": "México", "ES": "España", "CA": "Canadá", "AU": "Australia" };
        
        let db;
        let currentPage = 0;
        let isLoading = false;
        let allEventsLoaded = false;
        let customEventsUnsubscribe = null; 
        let firebaseEvents = []; 
        let ticketmasterEvents = []; 

        document.addEventListener('DOMContentLoaded', () => {
            if (!TICKETMASTER_API_KEY || TICKETMASTER_API_KEY === 'PEGA_AQUI_TU_API_KEY') { showApiKeyWarning(); lucide.createIcons(); return; }
            if (!firebaseConfig.projectId) { showFirebaseConfigWarning(); lucide.createIcons(); return; }
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
            } catch(e) { console.error("Error al inicializar Firebase.", e); if (e.code !== 'duplicate-app') { renderError("Error de configuración de Firebase"); lucide.createIcons(); return; } }
            
            setupCustomCountrySelector();
            setupTabs();
            setupInfiniteScroll();
            setupNotification();
            startNewSearch(); 
            lucide.createIcons();
        });

        function setupNotification() {
            const bellButton = document.getElementById('bell-button');
            const modal = document.getElementById('notification-modal');
            const bellDot = document.getElementById('bell-dot');
            const modalClose = document.getElementById('modal-close-button');

            bellButton.addEventListener('click', () => {
                modal.classList.remove('hidden');
                bellDot.classList.add('hidden');
                lucide.createIcons(); // Vuelve a renderizar el ícono de cierre en el modal
            });
            modalClose.addEventListener('click', () => modal.classList.add('hidden'));
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.add('hidden'); });
        }
        
        function startNewSearch() {
            currentPage = 0;
            allEventsLoaded = false;
            firebaseEvents = [];
            ticketmasterEvents = [];
            document.getElementById('event-list').innerHTML = '';
            document.getElementById('notification-modal').classList.add('hidden');
            document.getElementById('bell-dot').classList.add('hidden');

            setupRealtimeListener(); 
            fetchTicketmasterEvents();
        }

        function setupRealtimeListener() {
            if (customEventsUnsubscribe) customEventsUnsubscribe();

            const countryCode = document.getElementById('country-selector-button').dataset.code;
            const category = document.querySelector('.tab-button.active').dataset.category;
            
            const q = query(collection(db, "events"), where("countryCode", "==", countryCode), where("category", "==", category));
            
            customEventsUnsubscribe = onSnapshot(q, (querySnapshot) => {
                console.log(`[DEBUG-FIREBASE] La consulta en tiempo real devolvió ${querySnapshot.size} documento(s) para ${countryCode}/${category}.`);
                const allFirebaseEvents = querySnapshot.docs.map(doc => doc.data());
                
                const today = new Date();
                const year = today.getFullYear();
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const day = String(today.getDate()).padStart(2, '0');
                const todayDateString = `${year}-${month}-${day}`;
                
                const futureFirebaseEvents = allFirebaseEvents.filter(event => event.date >= todayDateString);
                
                checkForNewFirebaseEvents(futureFirebaseEvents, countryCode, category);
                firebaseEvents = futureFirebaseEvents;
                mergeAndRenderAllEvents(); 
            }, (error) => {
                console.error("Error en el listener de Firebase: ", error);
                renderError("Error de conexión en tiempo real.");
            });
        }
        
        async function fetchTicketmasterEvents() {
            isLoading = true;
            const countryCode = document.getElementById('country-selector-button').dataset.code;
            const category = document.querySelector('.tab-button.active').dataset.category;
            const classificationName = mapCategoryToClassification(category);
            const infiniteLoader = document.getElementById('infinite-loader');

            if (currentPage === 0) {
                document.getElementById('event-list').innerHTML = `<div class="flex justify-center py-10 col-span-full"><div class="loader"></div></div>`;
            } else {
                infiniteLoader.classList.remove('hidden');
            }
            
            const todayISOString = new Date().toISOString().split('.')[0] + "Z";
            const apiUrl = `https://app.ticketmaster.com/discovery/v2/events.json?classificationName=${classificationName}&countryCode=${countryCode}&apikey=${TICKETMASTER_API_KEY}&sort=date,asc&startDateTime=${todayISOString}&size=50&page=${currentPage}`;
            
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                const apiEventsRaw = data._embedded ? data._embedded.events : [];
                
                if (apiEventsRaw.length === 0 && currentPage > 0) allEventsLoaded = true;
                
                const newApiEvents = apiEventsRaw.map(transformApiEvent);
                ticketmasterEvents = (currentPage === 0) ? newApiEvents : [...ticketmasterEvents, ...newApiEvents];
                
                mergeAndRenderAllEvents();
            } catch (error) {
                console.error("Error fetching Ticketmaster events:", error);
                renderError();
            } finally {
                isLoading = false;
                infiniteLoader.classList.add('hidden');
            }
        }

        function mergeAndRenderAllEvents() {
            const combinedEvents = [...ticketmasterEvents, ...firebaseEvents];
            combinedEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
            renderEvents(combinedEvents);
        }

        function checkForNewFirebaseEvents(events, countryCode, category) {
            const storageKey = `seenFirebaseEvents-${countryCode}-${category}`;
            const seenEventsJSON = localStorage.getItem(storageKey);
            const seenEvents = seenEventsJSON ? new Set(JSON.parse(seenEventsJSON)) : new Set();

            const currentEventIds = events.map(event => `${event.title}-${event.date}`);
            const newEventIds = currentEventIds.filter(id => !seenEvents.has(id));

            if (newEventIds.length > 0 && seenEvents.size > 0) {
                const newList = document.getElementById('new-events-list');
                const bellDot = document.getElementById('bell-dot');
                
                const newEventObjects = events.filter(event => newEventIds.includes(`${event.title}-${event.date}`));
                newList.innerHTML = newEventObjects.map(event => `<li>${event.title}</li>`).join('');
                
                bellDot.classList.remove('hidden');
            }
            localStorage.setItem(storageKey, JSON.stringify(currentEventIds));
        }
        
        function renderEvents(events) {
            const eventListContainer = document.getElementById('event-list');
            const countryCode = document.getElementById('country-selector-button').dataset.code;
            const category = document.querySelector('.tab-button.active').dataset.category;
            const countryName = countries[countryCode];
            document.getElementById('events-title').textContent = `Eventos de ${category} en ${countryName}`;
            
            if (events.length === 0 && !isLoading) {
                eventListContainer.innerHTML = `<div class="text-center py-10 col-span-full"><i data-lucide="calendar-off" class="mx-auto h-12 w-12 text-gray-500"></i><p class="mt-4 text-gray-400">No se encontraron eventos</p></div>`;
            } else {
                 eventListContainer.innerHTML = events.map(event => createEventCard(event)).join('');
            }
            lucide.createIcons();
        }

        function mapCategoryToClassification(category) { switch (category) { case 'musica': return 'Music'; case 'deportes': return 'Sports'; case 'entretencion': return 'Arts & Theatre'; default: return 'Music'; } }
        function setupInfiniteScroll() { window.addEventListener('scroll', () => { if (isLoading || allEventsLoaded) return; if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) { currentPage++; fetchTicketmasterEvents(); } }); }
        function setupCustomCountrySelector() { const selectorContainer = document.getElementById('custom-country-selector'); const button = document.getElementById('country-selector-button'); const optionsContainer = document.getElementById('country-options'); button.dataset.code = 'CL'; Object.entries(countries).forEach(([code, name]) => { const option = document.createElement('button'); option.type = 'button'; option.textContent = name; option.className = 'w-full text-left px-3 py-2 text-sm hover:bg-gray-700 transition-colors'; option.addEventListener('click', () => { button.dataset.code = code; button.querySelector('span').textContent = name; optionsContainer.classList.add('hidden'); startNewSearch(); }); optionsContainer.appendChild(option); }); button.addEventListener('click', () => optionsContainer.classList.toggle('hidden')); document.addEventListener('click', (e) => { if (!selectorContainer.contains(e.target)) optionsContainer.classList.add('hidden'); }); }
        function setupTabs() { const tabsContainer = document.getElementById('category-tabs'); tabsContainer.addEventListener('click', (e) => { const clickedTab = e.target.closest('.tab-button'); if (!clickedTab) return; document.querySelectorAll('.tab-button').forEach(tab => tab.classList.remove('active')); clickedTab.classList.add('active'); startNewSearch(); }); }
        function transformApiEvent(event) { return { title: event.name, date: event.dates.start.localDate, time: event.dates.start.localTime, venue: event._embedded?.venues[0]?.name || 'Lugar por confirmar', city: event._embedded?.venues[0]?.city?.name || 'Ciudad por confirmar', ticketUrl: event.url || '#', image: event.images?.[0]?.url || '', price: event.priceRanges?.[0]?.min || 'N/A' }; }
        function renderError(message = "Hubo un error al cargar los eventos.") { const eventListContainer = document.getElementById('event-list'); if (eventListContainer) { eventListContainer.innerHTML = `<div class="text-center py-10"><i data-lucide="alert-circle" class="mx-auto h-12 w-12 text-red-500"></i><p class="mt-4 text-red-400">${message}</p></div>`; lucide.createIcons(); } }
        function showApiKeyWarning() { renderError("Configuración Requerida: Falta la API Key de Ticketmaster."); }
        function showFirebaseConfigWarning() { renderError("Configuración Requerida: Falta la configuración de Firebase."); }
        function createEventCard(event) { const { title, date, time, venue, city, ticketUrl, image, price } = event; const eventDate = new Date(`${date}T${time || '00:00:00'}`); const formattedDate = eventDate.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' }); const formattedTime = time ? eventDate.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }) : 'Hora por confirmar'; return `<div class="bg-gradient-to-b from-gray-800 to-gray-900 rounded-lg overflow-hidden shadow-lg hover:shadow-2xl transition-shadow duration-300 flex flex-col h-full"><div class="relative overflow-hidden h-40 sm:h-48 bg-gray-700">${image ? `<img src="${image}" alt="${title}" class="w-full h-full object-cover" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22%3E%3Crect fill=%22%23374151%22 width=%22400%22 height=%22300%22/%3E%3C/svg%3E'">` : '<div class="w-full h-full bg-gradient-to-r from-purple-700 to-pink-500 flex items-center justify-center"><i data-lucide="image" class="w-8 h-8 text-gray-300"></i></div>'}</div><div class="p-3 sm:p-4 flex-1 flex flex-col"><h3 class="font-bold text-sm sm:text-base text-white line-clamp-2 mb-2">${title}</h3><div class="text-xs sm:text-sm text-gray-300 space-y-1 flex-1"><div class="flex items-center space-x-1"><i data-lucide="calendar" class="w-3 h-3 sm:w-4 sm:h-4 text-purple-400 flex-shrink-0"></i><span>${formattedDate}</span></div><div class="flex items-center space-x-1"><i data-lucide="clock" class="w-3 h-3 sm:w-4 sm:h-4 text-purple-400 flex-shrink-0"></i><span>${formattedTime}</span></div><div class="flex items-start space-x-1"><i data-lucide="map-pin" class="w-3 h-3 sm:w-4 sm:h-4 text-purple-400 flex-shrink-0 mt-0.5"></i><span class="line-clamp-1">${venue}</span></div><div class="flex items-start space-x-1"><i data-lucide="building-2" class="w-3 h-3 sm:w-4 sm:h-4 text-purple-400 flex-shrink-0 mt-0.5"></i><span class="line-clamp-1">${city}</span></div></div><div class="mt-3 pt-3 border-t border-gray-700"><p class="text-purple-300 font-semibold text-xs sm:text-sm">Desde ${price === 'N/A' ? 'Precio variable' : `$${price}`}</p></div></div><a href="${ticketUrl}" target="_blank" rel="noopener noreferrer" class="mt-3 w-full bg-purple-600 hover:bg-purple-700 transition-colors duration-200 text-white font-semibold py-2 px-3 rounded-lg text-center text-xs sm:text-sm flex items-center justify-center space-x-1"><span>Comprar entradas</span><i data-lucide="external-link" class="w-3 h-3 sm:w-4 sm:h-4"></i></a></div>`; }
    </script>
</body>
</html>
